name: artist_in
description: Artista - Entertainment & Community Platform
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  image_picker: ^1.0.7
  http: ^1.2.0
  shared_preferences: ^2.2.2
  flutter_native_splash: ^2.3.10
  stomp_dart_client: ^2.0.0
  video_player: ^2.9.1

  visibility_detector: ^0.4.0+2
  chewie: ^1.8.5
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/Artist.inlogo.png
    - assets/icon/app_icon.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/Artist.inlogo.png
  android_12:
    color: "#FFFFFF"
    image: assets/images/Artist.inlogo.png